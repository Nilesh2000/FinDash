services:
  postgres:
    ports:
      - "127.0.0.1:5433:5432"

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/digitalocean/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - metanet
    depends_on:
      metabase:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
