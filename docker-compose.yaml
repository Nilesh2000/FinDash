services:
  postgres:
    image: postgres:latest
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - metanet
    volumes:
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:v0.60.3.8
    container_name: metabase
    restart: unless-stopped
    environment:
      MB_DB_TYPE: ${MB_DB_TYPE}
      MB_DB_DBNAME: ${MB_DB_DBNAME}
      MB_DB_PORT: ${MB_DB_PORT}
      MB_DB_USER: ${MB_DB_USER}
      MB_DB_PASS: ${MB_DB_PASSWORD}
      MB_DB_HOST: ${MB_DB_HOST}
      JAVA_TIMEZONE: ${JAVA_TIMEZONE}
      JAVA_OPTS: "-Xmx1g -Xms512m"
    networks:
      - metanet
    depends_on:
      postgres:
        condition: service_healthy

  postgrest:
    image: postgrest/postgrest:latest
    container_name: postgrest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://${POSTGREST_DB_USER}:${POSTGREST_DB_PASSWORD}@postgres:5432/portfolio
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3001
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - metanet
    depends_on:
      postgres:
        condition: service_healthy
  
  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: swagger-ui
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - metanet
    environment:
      API_URL: http://localhost:3001

networks:
  metanet:
    driver: bridge
